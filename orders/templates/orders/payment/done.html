{% extends "store/base.html" %}

{% block title %}Payment Successful - Kangarli Leather{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5 text-center">
    <div class="col-md-8">
        <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
        <h2 class="fw-bold mt-4 mb-3" style="font-family: 'Playfair Display', serif;">Payment Successful!</h2>
        <p class="lead text-muted mb-5">Thank you for your purchase. Your order has been marked as paid and is now being processed.</p>
        
        <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'orders:user_orders' %}" class="btn btn-dark px-4">View My Orders</a>
            <a href="{% url 'store:product_list' %}" class="btn btn-outline-dark px-4">Continue Shopping</a>
        </div>
    </div>
</div>
{% endblock %}
